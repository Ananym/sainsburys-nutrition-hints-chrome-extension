<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sainsbury's Nutrition Hints — Debug</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.3rem; }
    #status { margin: 16px 0; padding: 12px; background: #f5f5f5; border-radius: 6px; }
    #summary { margin-top: 16px; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 13px; }
    th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid #eee; }
    button { padding: 6px 16px; margin-right: 8px; cursor: pointer; }
    .error { color: #c00; }
    .success { color: #080; }
  </style>
</head>
<body>
  <h1>Sainsbury's Nutrition Hints — Debug</h1>
  <div id="status">Loading...</div>
  <div>
    <input type="file" id="file" accept=".json" style="display:none">
    <button id="importBtn">Import products.json</button>
    <button id="clearBtn">Clear data</button>
  </div>
  <div id="summary"></div>
  <script src="debug.js"></script>
</body>
</html>
